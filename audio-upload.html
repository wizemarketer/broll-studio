<script>
(async () => {
  const session = await requireAuth();
  if (!session) return;
  const userId = session.user.id;

  const dropzone = document.getElementById("dropzone");
  const fileInput = document.getElementById("fileInput");
  const browseBtn = document.getElementById("browseFilesBtn");
  const statusEl = document.getElementById("uploadStatus");
  const waveformStatus = document.getElementById("waveformStatus");
  const playerWrap = document.getElementById("audioPlayerWrap");

  browseBtn.addEventListener("click", (e) => { e.stopPropagation(); fileInput.click(); });
  dropzone.addEventListener("click", () => fileInput.click());
  dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("border-secondary"); });
  dropzone.addEventListener("dragleave", () => dropzone.classList.remove("border-secondary"));
  dropzone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropzone.classList.remove("border-secondary");
    if (e.dataTransfer.files[0]) {
      fileInput.files = e.dataTransfer.files;
      handleUpload(e.dataTransfer.files[0]);
    }
  });
  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) handleUpload(fileInput.files[0]);
  });

  async function handleUpload(file) {
    statusEl.textContent = "Uploading " + file.name + "...";
    waveformStatus.textContent = "Uploading...";

    const path = `${userId}/${Date.now()}-${file.name}`;
    const { error: uploadError } = await supabase.storage.from("audio").upload(path, file);

    if (uploadError) {
      statusEl.textContent = "Upload failed: " + uploadError.message;
      waveformStatus.textContent = "Upload failed";
      return;
    }

    const trackType = file.name.toLowerCase().includes("music") ? "music" : "voiceover";
    const { error: insertError } = await supabase.from("audio_tracks").insert({
      user_id: userId,
      storage_path: path,
      title: file.name,
      track_type: trackType
    });

    if (insertError) {
      statusEl.textContent = "Saved file but failed to record it: " + insertError.message;
      return;
    }

    const { data: signed } = await supabase.storage.from("audio").createSignedUrl(path, 3600);
    waveformStatus.textContent = file.name;
    playerWrap.innerHTML = `<audio controls src="${signed?.signedUrl || ''}" class="w-full"></audio>`;
    statusEl.textContent = "Uploaded and saved!";
  }
})();
</script>
