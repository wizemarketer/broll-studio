<!-- Modal Overlay -->

<button onclick="window.location.href='dashboard.html'" class="text-on-surface-variant hover:text-on-surface transition-colors p-xs rounded-lg hover:bg-surface-container-highest">
<span class="material-symbols-outlined" data-icon="close">close</span>

</div>
<!-- Modal Body -->
<div class="p-lg flex flex-col gap-lg overflow-y-auto max-h-[716px]">
<!-- File Name -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant">File Name</label>
<input id="exportFileName" class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-sm font-body-lg text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all" type="text" value="My_Video_Export">
</div>
<!-- Format Selection -->

<label class="font-label-md text-label-md text-on-surface-variant">Format</label>
<div class="flex rounded-lg overflow-hidden border border-outline-variant">
<button class="flex-1 bg-secondary text-on-secondary font-label-md text-label-md py-sm px-md transition-colors">MP4</button>

<style>

    </style>

<script>
(async () => {
  const session = await requireAuth();
  if (!session) return;
  const userId = session.user.id;

  let selectedResolution = "1080p";
  const resOptions = document.querySelectorAll(".res-option");
  resOptions.forEach(opt => {
    opt.addEventListener("click", () => {
      resOptions.forEach(o => {
        o.classList.remove("border-2", "border-secondary", "bg-surface-container");
        o.classList.add("border", "border-outline-variant");
        const mark = o.querySelector(".check-mark");
        if (mark) mark.remove();
      });
      opt.classList.remove("border", "border-outline-variant");
      opt.classList.add("border-2", "border-secondary", "bg-surface-container");
      selectedResolution = opt.dataset.res;
    });
  });

  const startBtn = document.getElementById("startExportBtn");
  const statusSection = document.getElementById("exportStatusSection");
  const statusText = document.getElementById("exportStatusText");

  startBtn.addEventListener("click", async () => {
    startBtn.disabled = true;
    statusSection.style.display = "flex";
    statusText.textContent = "Creating export request...";

    const params = new URLSearchParams(window.location.search);
    let timelineId = params.get("timeline");

    // If no timeline is specified, create a lightweight one so the export has something to point to.
    if (!timelineId) {
      const { data: timeline, error: timelineError } = await supabase
        .from("timelines")
        .insert({ user_id: userId, title: document.getElementById("exportFileName").value.trim() || "Untitled Timeline" })
        .select()
        .single();
      if (timelineError) {
        statusText.textContent = "Error: " + timelineError.message;
        startBtn.disabled = false;
        return;
      }
      timelineId = timeline.id;
    }

    const { data: exportRow, error } = await supabase
      .from("exports")
      .insert({
        user_id: userId,
        timeline_id: timelineId,
        status: "queued",
        resolution: selectedResolution
      })
      .select()
      .single();

    startBtn.disabled = false;

    if (error) {
      statusText.textContent = "Error: " + error.message;
      return;
    }

    statusText.textContent = "Export request queued (id: " + exportRow.id.slice(0, 8) + "...). Rendering isn't hooked up to a video engine yet — this just records the request.";
  });
})();
</script>
